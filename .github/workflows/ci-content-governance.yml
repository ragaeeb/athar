name: CI Content Governance (Advisory)

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  advisory-content-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Advisory content-governance check
        id: content_governance
        run: |
          set +e

          report_file="content-governance-report.txt"
          bun run lint:content-governance > "$report_file" 2>&1
          exit_code=$?

          {
            echo "### Advisory content-governance check"
            if [ "$exit_code" -eq 0 ]; then
              echo
              echo "- ✅ No issues found"
            else
              echo
              echo "- ⚠️ Advisory issues detected (non-blocking)"
              echo
              echo "<details><summary>First report lines</summary>"
              echo
              sed -n '1,40p' "$report_file"
              echo
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit "$exit_code"
        continue-on-error: true

      - name: Upload content-governance report
        if: steps.content_governance.outputs.exit_code != '0'
        uses: actions/upload-artifact@v6
        with:
          name: content-governance-report
          path: content-governance-report.txt
          if-no-files-found: ignore
          retention-days: 14
